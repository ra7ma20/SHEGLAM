<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>Regester</title>
    <link rel="stylesheet" href="register.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <!--first we have to creat regestration form-->
    <div class="container">
        <div class="form-box">
            <form action="" name="formfill" onsubmit="return validation()">
                
                <h2>Regester</h2>
                <p id="result"></p>
                <div class="input-box">
                    <i class='bx bx-user'></i>
                    <input type="text" name="username" placeholder="username">

                </div>
                <div class="input-box">
                    <i class='bx bx-envelope' ></i>
                    <input type="email" name="Email" placeholder="Email">

                </div>
                <div class="input-box">
                    <i class='bx bxs-lock-alt'></i>
                    <input type="password" name="password" placeholder="password">

                </div>
                <div class="input-box">
                    <i class='bx bxs-lock-alt'></i>
                    
                    <input type="password" name="Cpassword" placeholder="confirm password">

                </div>
                <div class="button">
                    <input type="submit" class="btn" onclick="validation()" value="Regester">
                </div>
                <div class="group">
                    <span><a href="#">forget-password</a></span>
                    <span><a href="./login.html">login</a></span>
                </div>

            </form>
        </div>
        <!--second step we have to create a pop up value-->
        <div class="popup" id="popup">
            <ion-icon name="checkmark-circle-outline"></ion-icon>
           <h2>Thank you!</h2> 
           <p>your regestration is sucessfully. Thanks! </p>
           <a href="login.html"> <button onclick="closeSlide()"> OK</button></a>
        </div>
    </div>
    

    <script src="register.js"></script>
</body>
</html>
